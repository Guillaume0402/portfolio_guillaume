services:
  web:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
      target: dev
    container_name: ${COMPOSE_PROJECT_NAME:-app}_web
    ports:
      - "${WEB_PORT:-8080}:80"
    volumes:
      - .:/var/www/html
    environment:
      APP_ENV: ${APP_ENV:-dev}
      APP_TZ: ${APP_TZ:-Europe/Paris}
      DB_HOST: ${DB_HOST:-db}
      DB_PORT: ${DB_PORT:-3306}
      DB_NAME: ${DB_NAME:-app}
      DB_USER: ${DB_USER:-app_user}
      DB_PASSWORD: ${DB_PASSWORD:-app_password}
    depends_on:
      - db
    networks:
      - app_net

  db:
    image: mysql:8.0
    container_name: ${COMPOSE_PROJECT_NAME:-app}_db
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root}
      MYSQL_DATABASE: ${DB_NAME:-app}
      MYSQL_USER: ${DB_USER:-app_user}
      MYSQL_PASSWORD: ${DB_PASSWORD:-app_password}
    ports:
      - "${DB_PUBLISHED_PORT:-3307}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./docker/mysql/initdb:/docker-entrypoint-initdb.d:ro
    networks:
      - app_net

  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: ${COMPOSE_PROJECT_NAME:-app}_pma
    ports:
      - "${PMA_PORT:-8081}:80"
    environment:
      PMA_HOST: ${DB_HOST:-db}
      PMA_USER: ${DB_USER:-app_user}
      PMA_PASSWORD: ${DB_PASSWORD:-app_password}
      PMA_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root}
    depends_on:
      - db
    networks:
      - app_net

  mailpit:
    image: axllent/mailpit
    container_name: ${COMPOSE_PROJECT_NAME:-app}_mailpit
    ports:
      - "${MAILPIT_UI_PORT:-8025}:8025"
      - "${MAILPIT_SMTP_PORT:-1025}:1025"
    networks:
      - app_net

volumes:
  mysql_data:

networks:
  app_net:
    driver: bridge